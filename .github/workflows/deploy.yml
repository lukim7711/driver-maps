name: Deploy to Cloudflare

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy-workers:
    name: Deploy Workers (Backend API)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Apply D1 Schema
        run: wrangler d1 execute driver-maps-cache --file=./schema.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set Google Maps API Key Secret
        run: |
          if [ -n "${{ secrets.GOOGLE_MAPS_API_KEY }}" ]; then
            echo "${{ secrets.GOOGLE_MAPS_API_KEY }}" | wrangler secret put GOOGLE_MAPS_API_KEY
            echo "Secret set successfully"
          else
            echo "GOOGLE_MAPS_API_KEY secret not set in GitHub, skipping"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-pages:
    name: Deploy Pages (Frontend)
    runs-on: ubuntu-latest
    needs: deploy-workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          # Copy Pages Functions to dist
          mkdir -p dist/functions
          cp -r ../functions/* dist/functions/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=driver-maps --commit-dirty=true
